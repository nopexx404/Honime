<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Content</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}
.card{
background:#fff;
padding:30px;
border-radius:12px;
max-width:420px;
margin:auto;
}
.btn{
display:block;
margin:15px 0;
padding:15px;
background:#07d36b;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.btn.done{
background:gray;
}
.progress{
margin-top:20px;
}
.final{
background:#ccc;
}
.final.enabled{
background:#07d36b;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Complete tasks to unlock</h2>

<button class="btn" id="t1">Task 1</button>
<button class="btn" id="t2">Task 2</button>
<button class="btn" id="t3">Task 3</button>

<div class="progress">
Progress: <span id="p">0/3</span>
</div>

<button id="final" class="btn final" disabled>Unlock Now</button>

</div>

<script>

// ===== GEO OFFERS =====
const OFFERS_BY_GEO = {
  US: [
    "https://your-us-offer-1",
    "https://your-us-offer-2"
  ],
  VN: [
    "https://your-vn-offer-1",
    "https://your-vn-offer-2"
  ],
  DEFAULT: [
    "https://your-global-offer"
  ]
};

// ===== FINAL LINK (HIGH PAYOUT) =====
const FINAL_LINK = "https://your-best-offer";

// ===== STATE =====
let done = [false,false,false];
let usedLinks = [];
let leaveTime = 0;
let currentTask = null;
let userCountry = "DEFAULT";

// ===== GET GEO =====
async function getUserCountry(){
  try{
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    userCountry = data.country_code || "DEFAULT";
  }catch{
    userCountry = "DEFAULT";
  }
}
getUserCountry();

// ===== GET BEST OFFER =====
function getBestOffer(){

  let pool = OFFERS_BY_GEO[userCountry] || OFFERS_BY_GEO.DEFAULT;

  let available = pool.filter(l => !usedLinks.includes(l));

  if(available.length === 0){
    usedLinks = [];
    available = [...pool];
  }

  const link = available[Math.floor(Math.random()*available.length)];
  usedLinks.push(link);

  return link;
}

// ===== CLICK TASK =====
document.querySelectorAll(".btn").forEach((btn,i)=>{

  if(i>=3) return;

  btn.onclick = ()=>{

    if(done[i]) return;

    const url = getBestOffer();
    window.open(url,"_blank");

    currentTask = i;
    leaveTime = Date.now();

  };

});

// ===== CHECK RETURN =====
document.addEventListener("visibilitychange", ()=>{

  if(document.visibilityState === "visible" && currentTask !== null){

    let timeAway = (Date.now() - leaveTime)/1000;

    if(timeAway >= 5){
      startCountdown(currentTask);
      currentTask = null;
    }

  }

});

// ===== COUNTDOWN =====
function startCountdown(i){

  let t = 10;
  const btn = document.querySelectorAll(".btn")[i];

  const timer = setInterval(()=>{

    btn.innerText = "Waiting " + t + "s";
    t--;

    if(t < 0){
      clearInterval(timer);

      done[i] = true;
      btn.classList.add("done");
      btn.innerText = "✓ Completed";

      updateProgress();
    }

  },1000);

}

// ===== UPDATE =====
function updateProgress(){

  let count = done.filter(x=>x).length;

  document.getElementById("p").innerText = count + "/3";

  if(count === 3){
    const final = document.getElementById("final");

    final.disabled = false;
    final.classList.add("enabled");

    final.onclick = ()=>{
      window.open(FINAL_LINK,"_blank");
    };
  }

}

</script>

</body>
</html>
