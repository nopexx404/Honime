<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Complete all</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f4f5f7;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:420px;
background:#fff;
border-radius:18px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
text-align:center;
}

.title{font-size:36px;font-weight:700}
.subtitle{color:#777;margin-bottom:20px}

.action{
height:65px;
margin:12px 0;
border-radius:12px;
background:linear-gradient(180deg,#16c172,#0fa15e);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:600;
cursor:pointer;
}

.action.done{background:#ccc;cursor:default}

.progress-bar{
height:10px;
background:#eee;
border-radius:8px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0;
background:green;
}

.final{
margin-top:20px;
height:55px;
border-radius:12px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

.final.enabled{
background:green;
cursor:pointer;
}

/* POPUP */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.25s;
z-index:999;
}

#popupBox{
background:#fff;
padding:25px;
border-radius:14px;
width:260px;
text-align:center;
}

#popupIcon{
font-size:28px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

<h1 class="title">Complete all</h1>
<p class="subtitle">Click and stay 5 seconds before returning.</p>

<div class="action" id="btn-0">Click, stay 5s, then return</div>
<div class="action" id="btn-1">Click, stay 5s, then return</div>
<div class="action" id="btn-2">Click, stay 5s, then return</div>

<p>Progress <span id="progress-text">0/3</span></p>

<div class="progress-bar">
<div id="progress-fill" class="progress-fill"></div>
</div>

<div id="finalBtn" class="final">Unlock</div>

</div>

<!-- POPUP -->
<div id="overlay">
<div id="popupBox">
<div id="popupIcon">⏳</div>
<div id="popupText">Checking...</div>
</div>
</div>

<script>

// ===== GEO =====
const OFFERS_BY_GEO = {
US:["https://omg10.com/4/9150460"],
VN:["https://dressingcomplete.com/hq15mh6nqw?key=c86f18b3dbc35f9b75e5a3fa6dda0f19"],
DEFAULT:["https://omg10.com/4/9150460"]
};

const FINAL_LINK = "https://link-center.net/4383232/3ce7PHaLKip9";

let userCountry="DEFAULT";
fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(d=>userCountry=d.country_code||"DEFAULT")
.catch(()=>{});

// ===== RANDOM UNIQUE =====
let usedLinks=[];
function getLink(){
let pool=OFFERS_BY_GEO[userCountry]||OFFERS_BY_GEO.DEFAULT;

let available=pool.filter(l=>!usedLinks.includes(l));

if(available.length===0){
usedLinks=[];
available=pool;
}

let link=available[Math.floor(Math.random()*available.length)];
usedLinks.push(link);
return link;
}

// ===== OPEN CHROME =====
function isAndroid(){ return /Android/i.test(navigator.userAgent); }

function openLink(url){
if(isAndroid()){
const noProto=url.replace(/^https?:\/\//,'');
window.location='intent://'+noProto+'#Intent;scheme=https;package=com.android.chrome;end';
setTimeout(()=>window.open(url,"_blank"),800);
}else{
window.open(url,"_blank");
}
}

// ===== POPUP =====
function showPopup(text,icon="⏳",color="#000"){
document.getElementById("popupText").innerText=text;
let ic=document.getElementById("popupIcon");
ic.innerText=icon;
ic.style.color=color;

let o=document.getElementById("overlay");
o.style.opacity="1";
o.style.pointerEvents="auto";
}

function hidePopup(){
let o=document.getElementById("overlay");
o.style.opacity="0";
o.style.pointerEvents="none";
}

// ===== STATE =====
let states=[false,false,false];
let leaveTime=0;
let currentTask=null;

// ===== CLICK =====
document.querySelectorAll(".action").forEach((btn,i)=>{
btn.onclick=()=>{
if(states[i]) return;

openLink(getLink());

currentTask=i;
leaveTime=Date.now();
};
});

// ===== RETURN =====
document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="visible" && currentTask!==null){

let t=(Date.now()-leaveTime)/1000;

if(t<5){
showPopup("Verification Failed\nStay at least 5 seconds","❌","red");
setTimeout(hidePopup,1800);
return;
}

showPopup("Checking...","⏳");

setTimeout(()=>{
hidePopup();
startCountdown(currentTask);
currentTask=null;
},1200);

}
});

// ===== COUNTDOWN =====
function startCountdown(i){
let btn=document.querySelectorAll(".action")[i];
let t=5;

let timer=setInterval(()=>{
btn.innerText="Verifying... "+t+"s";
t--;

if(t<0){
clearInterval(timer);
states[i]=true;
btn.classList.add("done");
btn.innerText="✓ Completed";
update();
}
},1000);
}

// ===== UPDATE =====
function update(){
let done=states.filter(x=>x).length;

document.getElementById("progress-text").innerText=done+"/3";
document.getElementById("progress-fill").style.width=(done/3*100)+"%";

if(done===3){
let f=document.getElementById("finalBtn");
f.classList.add("enabled");

f.onclick=()=>{
window.open(FINAL_LINK,"_blank");
};
}
}

</script>

</body>
</html>
