<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Complete all</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f4f5f7;
--card:#ffffff;
--green:#16c172;
--green-dark:#0fa15e;
--text:#222;
--muted:#777;
}

body{
margin:0;
font-family:"Poppins";
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
width:420px;
background:#fff;
border-radius:18px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
text-align:center;
}

.title{
font-size:38px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
color:var(--muted);
margin-bottom:25px;
}

.action{
height:68px;
margin:14px 0;
border-radius:12px;
background:linear-gradient(180deg,var(--green),var(--green-dark));
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:600;
cursor:pointer;
transition:0.2s;
box-shadow:0 6px 0 rgba(0,0,0,0.15);
}

.action:active{
transform:translateY(2px);
box-shadow:0 3px 0 rgba(0,0,0,0.15);
}

.action.done{
background:#cfcfcf;
box-shadow:none;
cursor:default;
}

.progress-bar{
height:10px;
background:#eee;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
height:100%;
width:0;
background:linear-gradient(90deg,#16c172,#0fa15e);
}

.final{
margin-top:20px;
height:60px;
border-radius:12px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:600;
}

.final.enabled{
background:linear-gradient(180deg,var(--green),var(--green-dark));
cursor:pointer;
}

/* WARNING TOAST */
.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#222;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:14px;
opacity:0;
transition:0.3s;
pointer-events:none;
}

.toast.show{
opacity:1;
}
</style>
</head>

<body>

<div class="card">

<h1 class="title">Complete all</h1>
<p class="subtitle">Click and stay at least 5 seconds before returning.</p>

<div class="action" id="btn-0">Click, stay 5s, then return</div>
<div class="action" id="btn-1">Click, stay 5s, then return</div>
<div class="action" id="btn-2">Click, stay 5s, then return</div>

<p>Unlock Progress <span id="progress-text">0/3</span></p>

<div class="progress-bar">
<div id="progress-fill" class="progress-fill"></div>
</div>

<div id="finalBtn" class="final">Complete all tasks</div>

</div>

<div id="toast" class="toast"></div>

<script>

// ===== TOAST =====
function showToast(msg){
const t = document.getElementById("toast");
t.innerText = msg;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);
}

// ===== CONFIG =====
const OFFERS = [
"https://omg10.com/4/9244925",
"https://dressingcomplete.com/hq15mh6nqw?key=c86f18b3dbc35f9b75e5a3fa6dda0f19",
"https://omg10.com/4/9150460"
];

const FINAL_LINK = "https://your-best-offer";

// ===== STATE =====
let states=[false,false,false];
let leaveTime=0;
let currentTask=null;

// ===== CLICK =====
document.querySelectorAll(".action").forEach((btn,i)=>{
btn.onclick=()=>{
if(states[i]) return;

window.open(OFFERS[i],"_blank");

currentTask=i;
leaveTime=Date.now();
};
});

// ===== RETURN CHECK =====
document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible" && currentTask!==null){

let timeAway=(Date.now()-leaveTime)/1000;

if(timeAway < 5){
showToast("Stay at least 5 seconds before returning.");
return;
}

startCountdown(currentTask);
currentTask=null;

}
});

// ===== COUNTDOWN =====
function startCountdown(i){
let btn=document.querySelectorAll(".action")[i];
let t=5;

let timer=setInterval(()=>{
btn.innerText="Verifying... "+t+"s";
t--;

if(t<0){
clearInterval(timer);
states[i]=true;
btn.classList.add("done");
btn.innerText="✓ Completed";
update();
}
},1000);
}

// ===== UPDATE =====
function update(){
let done=states.filter(x=>x).length;

document.getElementById("progress-text").innerText=done+"/3";
document.getElementById("progress-fill").style.width=(done/3*100)+"%";

if(done===3){
let f=document.getElementById("finalBtn");
f.classList.add("enabled");

f.onclick=()=>{
window.open(FINAL_LINK,"_blank");
};
}
}

</script>

</body>
</html>
